<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Sensei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Левая панель с метриками -->
    <div class="sidebar">
        <h2>🏯 Digital Sensei</h2>
        
        <!-- Статистика пользователя -->
        <div class="stats">
            <div class="stat-row">
                <span>Твой ранг:</span>
                <span id="rankDisplay" class="rank-value">загрузка...</span>
            </div>
            <div class="stat-row">
                <span>Серия:</span>
                <span id="streakDisplay">...</span>
            </div>
            <div class="stat-row">
                <span>Всего дней:</span>
                <span id="totalDaysDisplay">...</span>
            </div>
        </div>

        <!-- Метрики Бусидо (7 принципов) -->
        <div class="metrics-section">
            <h3>⚔️ МЕТРИКИ ПУТИ</h3>
            <div id="bushidoMetrics" class="bushido-list">
            </div>
        </div>

        <!-- Метрики Меча (пользовательские) -->
        <div class="metrics-section">
            <h3>🗡️ МЕТРИКИ МЕЧА</h3>
            <div id="swordMetrics" class="sword-list">
            </div>
        </div>

        <!-- Метрики качества (сегодня) -->
        <div class="metrics-panel">
            <h3>📊 СЕГОДНЯ</h3>
            
            <div class="metric-item">
                <div class="metric-header">
                    <span class="metric-name">⚡ Энергия</span>
                    <span class="metric-value" id="energyValue">7</span>
                </div>
                <input type="range" id="energySlider" min="1" max="10" value="7">
            </div>
            
            <div class="metric-item">
                <div class="metric-header">
                    <span class="metric-name">🏃 Движение</span>
                    <span class="metric-value" id="movementValue">6</span>
                </div>
                <input type="range" id="movementSlider" min="1" max="10" value="6">
            </div>
            
            <div class="metric-item">
                <div class="metric-header">
                    <span class="metric-name">👁️ Ясность</span>
                    <span class="metric-value" id="clarityValue">8</span>
                </div>
                <input type="range" id="claritySlider" min="1" max="10" value="8">
            </div>
            
            <!-- Кнопка открытия модалки -->
            <div class="send-with-metrics">
                <button id="openReportBtn">🌙 Написать вечерний отчёт</button>
            </div>
        </div>

        <!-- Рекомендации -->
        <div id="recommendations" class="recommendations">
        </div>
    </div>

    <!-- Правая панель с чатом -->
    <div class="chat-container">
        <div class="header">
            <h3>🏯 Додзё Бусидо</h3>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Утренняя декларация...">
            <button id="sendMorningBtn">Отправить</button>
        </div>
    </div>

    <!-- Затемнение фона и модалка -->
    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="reportModal" class="modal"><!-- ... содержимое модалки ... --></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
