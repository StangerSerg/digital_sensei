<!-- interface/web/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Sensei</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #2d2d2d; border-right: 1px solid #404040; padding: 20px; }
        .chat-container { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid #404040; background: #2d2d2d; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 18px; background: #3d3d3d; }
        .message.user .bubble { background: #005f4e; color: white; }
        .input-area { padding: 20px; border-top: 1px solid #404040; background: #2d2d2d; display: flex; gap: 12px; }
        input { flex: 1; padding: 12px; border: 1px solid #404040; border-radius: 24px; background: #3d3d3d; color: white; outline: none; }
        button { padding: 12px 24px; background: #005f4e; color: white; border: none; border-radius: 24px; cursor: pointer; }
        button:hover { background: #007a63; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🏯 Digital Sensei</h2>
        <p style="color: #aaa; margin-top: 8px;">Твой ранг: <span id="rank">3 кю · Воин</span></p>
        <p style="color: #aaa;">Серия: <span id="streak">14 дней</span></p>
        <hr style="border-color:#404040; margin: 20px 0;">
        <p style="color: #aaa;">Метрики сегодня:</p>
        <ul style="list-style: none; margin-top: 10px;">
            <li>⚡ Энергия: <span id="energy">7</span>/10</li>
            <li>🏃 Движение: <span id="movement">6</span>/10</li>
            <li>👁️ Ясность: <span id="clarity">8</span>/10</li>
        </ul>
    </div>

    <div class="chat-container">
        <div class="header">
            <h3>🏯 Додзё Бусидо</h3>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Твоя декларация или отчёт..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000"; // orchestrator

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // Добавляем сообщение пользователя
            addMessage(text, 'user');
            input.value = '';

            try {
                // Отправляем в оркестратор
                const response = await fetch(`${API_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        user_id: 1 // временно
                    })
                });

                const data = await response.json();
                addMessage(data.reply, 'bot');

                // Обновляем метрики в сайдбаре
                if (data.metrics) updateMetrics(data.metrics);

            } catch (error) {
                addMessage('Ошибка связи с сервером', 'bot');
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function updateMetrics(metrics) {
            document.getElementById('energy').textContent = metrics.energy || '7';
            document.getElementById('movement').textContent = metrics.movement || '6';
            document.getElementById('clarity').textContent = metrics.clarity || '8';
        }
    </script>
</body>
</html>
